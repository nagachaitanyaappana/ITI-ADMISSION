<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta http-equiv="Content-Type" content="text/html;charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>:: ITI ::</title>
    
    <link rel="shortcut icon" type="image/ico" th:href="@{/iti.png}" />
    <link rel="stylesheet" th:href="@{/css/expe1011.css}" />
    <script type="text/javascript" th:src="@{/js/jquery.min.js}"></script>

    <!-- (Keep the CSS and JS styles from the previous step here) -->
</head>
<body>

    <!-- Header, Menu, and Marquee (same as before) -->
    
    <form name="form1" method="POST" th:action="@{/trade_display2}">
         <p align="center" class="style4"> 
            <font color="blue" size="4">
                List of ITI's with Trades &amp; Strengths Interface
            </font>
        </p>

        <table align="center" border="1" id="AutoNumber1" bgcolor="#e4eeb9">
            <tbody>
                <tr>
                    <td>
                        <span class="style52">Select District : </span>
                    </td>
                    <td width="148">
                        <select name="dist_code" class="style52">
                                <option value="" selected>--select--</option>
                                <option th:each="dist : ${districtList}" 
                                    th:value="${dist.code}" 
                                    th:text="${dist.name}">
                                </option>
                        </select>
                    </td>
                </tr>
                <tr>
                    <td>GOVT/PVT</td>
                    <td> 
                        <select name="type">
                            <option value="">----ALL----</option>
                            <option value="G">GOVERNMENT</option>
                            <option value="P">PRIVATE</option>
                        </select>
                    </td>
                </tr>
                <tr bgcolor="green">
                    <td colspan="2">
                        <input type="submit" value="Submit" onclick="formSubmit()"/>
                    </td>
                </tr>
            </tbody>
        </table>
    </form>

    <h1 align="center"><strong>List of ITI's with Trades & Strengths</strong></h1>
    
    <!-- DYNAMIC DATA TABLE -->
    <table align="center" bgcolor="#ffffcc" id="tabcolor" border="1" width="80%">
        <tr bgcolor="green">
            <td colspan="2">&nbsp;</td>
        </tr>
        
        <!-- Loop through the list of ITIs provided by the Controller -->
        <tr th:each="iti : ${itiList}">
            <td>
                <!-- Link to individual ITI profile -->
                <a th:href="@{'/Iti_Registration_Report.jsp?iti_code=' + ${iti.code}}" 
                   th:text="${iti.code} + ' :- ' + ${iti.name}">ITI Name</a>
                
                <ol>
                    <!-- Loop through the trades for this specific ITI -->
                    <li th:each="trade : ${iti.trades}" 
                        th:text="${trade.name} + ' (' + ${trade.strength} + ')'">
                        Trade Name (Strength)
                    </li>
                </ol>
            </td>
        </tr>

        <tr bgcolor="green">
            <td colspan="2">&nbsp;</td>
        </tr>
    </table>

    <div align="center" style="margin-top: 20px;">
        <input type="button" onclick="tableToExcel('tabcolor', 'iti')" value="For Excel Sheet Download">
    </div>

</body>
</html>
